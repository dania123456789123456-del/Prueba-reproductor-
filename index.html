<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root {
  --ink: #05040f;
  --ink2: #0d0c1e;
  --panel: #12112a;
  --card: #1b1935;
  --border: rgba(138,92,246,0.18);
  --v: #8a5cf6;
  --vd: #5b21b6;
  --vl: #c4b5fd;
  --pink: #e879f9;
  --gold: #fbbf24;
  --txt: #f0eeff;
  --mute: #7474a0;
  --sw: 230px;
  --rad: 14px;
}

html,body { height:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--ink); color:var(--txt); }

/* ── LAYERS ── */
.layer { position:fixed; inset:0; transition:opacity .35s ease, transform .35s ease; z-index:10; }
.layer.off { opacity:0; pointer-events:none; transform:scale(1.015); }

/* ═══════════════ LOGIN ═══════════════ */
#L-login {
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse 120% 70% at 30% 50%, #2e1065 0%, var(--ink) 60%);
  overflow:hidden;
}

.stars-canvas { position:absolute; inset:0; pointer-events:none; }

.film-strip {
  position:absolute; bottom:0; left:0; right:0; height:70px;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 80px, rgba(138,92,246,.06) 80px, rgba(138,92,246,.06) 90px);
  border-top:1px solid rgba(138,92,246,.12);
  display:flex; align-items:center; padding:0 20px; gap:14px; overflow:hidden;
}
.film-hole { width:50px; height:36px; border:2px solid rgba(138,92,246,.15); border-radius:5px; flex-shrink:0; }

/* HORIZONTAL CARD */
.login-card {
  position:relative; z-index:2;
  display:flex; flex-direction:row;
  background: rgba(13,12,30,0.94);
  backdrop-filter:blur(28px);
  border:1px solid var(--border);
  border-radius:24px;
  width:min(820px,94vw);
  min-height:320px;
  box-shadow: 0 0 0 1px rgba(138,92,246,.07), 0 30px 80px rgba(0,0,0,.7), 0 0 100px rgba(138,92,246,.1);
  overflow:hidden;
}

/* LEFT BRANDING PANEL */
.login-left {
  width:280px; min-width:220px; flex-shrink:0;
  background:linear-gradient(145deg, rgba(138,92,246,.22) 0%, rgba(232,121,249,.08) 60%, rgba(18,17,42,.95) 100%);
  border-right:1px solid rgba(138,92,246,.18);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px; gap:10px; position:relative; overflow:hidden;
}
.login-left::before {
  content:''; position:absolute; top:-40px; left:-40px;
  width:180px; height:180px;
  background:radial-gradient(circle, rgba(138,92,246,.2) 0%, transparent 70%);
  pointer-events:none;
}
.login-left::after {
  content:''; position:absolute; bottom:-30px; right:-30px;
  width:140px; height:140px;
  background:radial-gradient(circle, rgba(232,121,249,.15) 0%, transparent 70%);
  pointer-events:none;
}

.login-logo {
  width:64px; height:64px; border-radius:18px;
  background:linear-gradient(135deg, var(--v), var(--pink));
  display:flex; align-items:center; justify-content:center; font-size:28px;
  box-shadow:0 8px 28px rgba(138,92,246,.5);
  animation:logoPulse 3s ease-in-out infinite; position:relative; z-index:1;
}
@keyframes logoPulse { 0%,100%{box-shadow:0 8px 28px rgba(138,92,246,.45)} 50%{box-shadow:0 8px 42px rgba(232,121,249,.6)} }

.login-h {
  font-family:'Outfit',sans-serif; font-size:26px; font-weight:900; text-align:center;
  background:linear-gradient(135deg,#fff 30%,var(--vl)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  position:relative; z-index:1;
}
.login-sub { text-align:center; color:var(--mute); font-size:12px; line-height:1.6; position:relative; z-index:1; }
.login-dots { display:flex; gap:6px; margin-top:8px; }
.login-dots span { width:6px; height:6px; border-radius:50%; background:rgba(138,92,246,.4); }
.login-dots span:nth-child(1){ background:var(--v); }
.login-dots span:nth-child(2){ background:var(--pink); opacity:.6; }

/* RIGHT FORM PANEL */
.login-right {
  flex:1; padding:32px 30px; display:flex; flex-direction:column; justify-content:center; gap:0;
}
.login-form-title {
  font-family:'Outfit',sans-serif; font-size:20px; font-weight:800;
  margin-bottom:20px; color:var(--txt);
}

.fgrp { margin-bottom:14px; }
.fgrp label { display:block; font-size:11px; font-weight:700; color:var(--mute); margin-bottom:6px; letter-spacing:.6px; text-transform:uppercase; font-family:'Outfit',sans-serif; }
.fgrp input {
  width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  border-radius:10px; padding:11px 14px; color:var(--txt); font-size:14px; font-family:inherit; outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.fgrp input:focus { border-color:var(--v); box-shadow:0 0 0 3px rgba(138,92,246,.2); }
.fgrp input::placeholder { color:rgba(255,255,255,.2); }

.btn-enter {
  width:100%; margin-top:8px;
  background:linear-gradient(135deg, var(--v), var(--vd));
  border:none; border-radius:12px; padding:13px; color:#fff;
  font-family:'Outfit',sans-serif; font-size:15px; font-weight:700; cursor:pointer;
  box-shadow:0 6px 22px rgba(138,92,246,.4); transition:transform .2s,box-shadow .2s;
}
.btn-enter:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(138,92,246,.5); }
.btn-enter:active { transform:translateY(0); }

.login-err { display:none; color:#f87171; font-size:12px; text-align:center; margin-top:10px; }

/* ═══════════════ APP SHELL ═══════════════ */
#L-app { display:flex; background:var(--ink); }

/* SIDEBAR */
.sidebar {
  width:var(--sw); min-width:var(--sw); height:100vh;
  background:rgba(13,12,30,0.98); backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:20px 0;
  transition:transform .3s ease; z-index:100;
}

.s-logo { display:flex; align-items:center; gap:11px; padding:0 18px 26px; border-bottom:1px solid rgba(255,255,255,.05); margin-bottom:12px; }
.s-logo-icon { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,var(--v),var(--pink)); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.s-logo-name { font-family:'Outfit',sans-serif; font-size:19px; font-weight:800;
  background:linear-gradient(135deg,#fff,var(--vl)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.s-section-lbl { font-size:10px; font-weight:700; color:var(--mute); text-transform:uppercase; letter-spacing:1.2px; padding:0 20px; margin:14px 0 6px; }

.s-item {
  display:flex; align-items:center; gap:11px; padding:10px 14px;
  margin:0 8px 2px; border-radius:10px; cursor:pointer;
  color:var(--mute); font-size:14px; font-weight:500; transition:all .2s;
}
.s-item:hover { background:rgba(138,92,246,.12); color:#fff; }
.s-item.on { background:linear-gradient(135deg,rgba(138,92,246,.28),rgba(232,121,249,.12)); color:#fff; border:1px solid rgba(138,92,246,.25); }
.s-item svg { width:18px; height:18px; fill:currentColor; flex-shrink:0; }

.s-bottom { margin-top:auto; padding:0 8px; border-top:1px solid rgba(255,255,255,.05); padding-top:12px; }

/* MAIN */
.main { flex:1; height:100vh; overflow-y:auto; overflow-x:hidden; scroll-behavior:smooth; }
.main::-webkit-scrollbar { width:5px; }
.main::-webkit-scrollbar-thumb { background:rgba(138,92,246,.3); border-radius:3px; }

/* TOPBAR */
.topbar {
  position:sticky; top:0; z-index:50;
  background:rgba(5,4,15,.85); backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:13px 20px; display:flex; align-items:center; gap:14px;
}
.topbar-menu-btn { display:none; background:none; border:none; color:var(--txt); cursor:pointer; padding:4px; }
.topbar-title { font-family:'Outfit',sans-serif; font-size:20px; font-weight:800; flex:1; }
.search-wrap {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09);
  border-radius:10px; padding:8px 13px; flex:1; max-width:320px;
}
.search-wrap svg { width:15px; height:15px; fill:var(--mute); flex-shrink:0; }
.search-wrap input { background:none; border:none; color:var(--txt); font-size:13px; font-family:inherit; outline:none; width:100%; }
.search-wrap input::placeholder { color:var(--mute); }

/* HERO */
.hero { position:relative; height:clamp(260px,45vw,480px); overflow:hidden; }
.hero-bg { position:absolute; inset:0; background-size:cover; background-position:center; transition:opacity .7s; }
.hero-grad {
  position:absolute; inset:0;
  background: linear-gradient(to right, rgba(5,4,15,.96) 0%,rgba(5,4,15,.75) 38%,rgba(5,4,15,.1) 70%,transparent 100%),
              linear-gradient(to top, rgba(5,4,15,1) 0%, rgba(5,4,15,.4) 25%, transparent 55%);
}
.hero-body { position:relative; z-index:1; padding:0 28px 32px; height:100%; display:flex; flex-direction:column; justify-content:flex-end; max-width:58%; }
.hero-tag { display:inline-flex; align-items:center; gap:5px; background:rgba(138,92,246,.22); border:1px solid rgba(138,92,246,.4); border-radius:20px; padding:3px 12px; font-size:11px; font-weight:700; color:var(--vl); margin-bottom:10px; font-family:'Outfit',sans-serif; letter-spacing:.5px; width:fit-content; }
.hero-ttl { font-family:'Outfit',sans-serif; font-size:clamp(20px,3.2vw,40px); font-weight:900; line-height:1.1; margin-bottom:10px; text-shadow:0 2px 24px rgba(0,0,0,.5); }
.hero-meta { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--mute); margin-bottom:10px; flex-wrap:wrap; }
.hero-stars { color:var(--gold); font-weight:700; }
.hero-desc { font-size:13px; color:#c0b8e8; line-height:1.65; margin-bottom:18px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.hero-btns { display:flex; gap:10px; flex-wrap:wrap; }

.btn-play {
  display:flex; align-items:center; gap:8px;
  background:linear-gradient(135deg,var(--v),var(--pink));
  border:none; border-radius:10px; padding:11px 22px; color:#fff;
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:700; cursor:pointer;
  box-shadow:0 4px 18px rgba(138,92,246,.4); transition:all .2s;
}
.btn-play:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(138,92,246,.5); }
.btn-info {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18);
  border-radius:10px; padding:11px 22px; color:#fff;
  font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; cursor:pointer;
  backdrop-filter:blur(10px); transition:all .2s;
}
.btn-info:hover { background:rgba(255,255,255,.16); }

/* SECTIONS */
.c-section { padding:22px 20px; }
.c-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.c-hdr-lft { display:flex; align-items:center; gap:10px; }
.c-hdr-title { font-family:'Outfit',sans-serif; font-size:17px; font-weight:800; }
.c-count { font-size:11px; color:var(--mute); background:rgba(255,255,255,.06); padding:2px 9px; border-radius:12px; }

/* POSTER GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:13px;
}
@media(min-width:600px){ .grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); } }
@media(min-width:1100px){ .grid { grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); } }

.pcard {
  border-radius:12px; overflow:hidden; cursor:pointer;
  aspect-ratio:2/3; position:relative; background:var(--card);
  transition:transform .25s, box-shadow .25s;
}
.pcard:hover { transform:translateY(-7px) scale(1.02); box-shadow:0 20px 44px rgba(0,0,0,.55), 0 0 0 1.5px rgba(138,92,246,.35); }
.pcard img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s; }
.pcard:hover img { transform:scale(1.06); }

.pcard-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(5,4,15,.95) 0%, rgba(5,4,15,.3) 55%, transparent 100%);
  display:flex; flex-direction:column; justify-content:flex-end; padding:10px;
  opacity:0; transition:opacity .25s;
}
.pcard:hover .pcard-overlay { opacity:1; }
.pcard-ptitle { font-size:12px; font-weight:700; line-height:1.3; margin-bottom:3px; }
.pcard-pyear { font-size:10px; color:var(--mute); }

.pcard-play {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(.7);
  width:46px; height:46px; background:rgba(138,92,246,.88);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:all .25s; box-shadow:0 0 20px rgba(138,92,246,.5);
}
.pcard:hover .pcard-play { opacity:1; transform:translate(-50%,-50%) scale(1); }
.pcard-play svg { width:18px; height:18px; fill:#fff; margin-left:3px; }

.pcard-type {
  position:absolute; top:8px; left:8px; font-size:9px; font-weight:800; font-family:'Outfit',sans-serif;
  background:linear-gradient(135deg,var(--v),var(--pink)); color:#fff;
  padding:3px 8px; border-radius:6px; text-transform:uppercase; letter-spacing:.5px;
}
.pcard-rt {
  position:absolute; top:8px; right:8px; font-size:10px; font-weight:700;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px); color:var(--gold);
  padding:3px 7px; border-radius:6px; display:flex; align-items:center; gap:2px;
}

.skel {
  background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.04) 50%,var(--card) 75%);
  background-size:200% 100%; animation:ske 1.5s infinite;
}
@keyframes ske { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ═══════════════ DETAIL MODAL ═══════════════ */
#L-detail { z-index:200; background:rgba(0,0,0,.87); backdrop-filter:blur(12px); overflow-y:auto; display:flex; align-items:flex-start; justify-content:center; padding:20px; }
.det-box { width:100%; max-width:920px; background:var(--ink2); border-radius:20px; overflow:hidden; border:1px solid var(--border); box-shadow:0 40px 90px rgba(0,0,0,.75); margin:auto; }

.det-back { position:relative; height:clamp(200px,38vw,360px); overflow:hidden; background:linear-gradient(135deg,#1b1935 0%,#2e1065 50%,#1b1935 100%); }
.det-back-img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; opacity:0; transition:opacity .5s; }
.det-back-grad {
  position:absolute; inset:0;
  background:linear-gradient(to top, var(--ink2) 0%, rgba(13,12,30,.6) 40%, rgba(13,12,30,.1) 100%),
             linear-gradient(to right, rgba(13,12,30,.4), transparent);
}

.det-close {
  position:absolute; top:14px; right:14px; z-index:5;
  width:38px; height:38px; background:rgba(0,0,0,.65); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15); border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; transition:all .2s;
}
.det-close:hover { background:rgba(138,92,246,.5); }

.det-body { padding:20px 26px 28px; }
.det-ttl { font-family:'Outfit',sans-serif; font-size:clamp(20px,3.5vw,32px); font-weight:900; margin-bottom:9px; line-height:1.15; }
.det-meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; font-size:12px; }
.det-badge { background:rgba(138,92,246,.18); border:1px solid rgba(138,92,246,.3); border-radius:6px; padding:2px 9px; color:var(--vl); font-weight:700; font-family:'Outfit',sans-serif; }
.det-yr { color:var(--mute); }
.det-rt { color:var(--gold); font-weight:700; }
.det-tm { color:var(--mute); }

.det-genres { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.genre { background:rgba(255,255,255,.07); border-radius:20px; padding:3px 11px; font-size:11px; color:var(--mute); font-weight:500; }

.det-syn { font-size:13px; line-height:1.72; color:#ccc8ee; margin-bottom:20px; }
.det-acts { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }

/* EPISODES */
.eps-section { border-top:1px solid rgba(255,255,255,.07); padding-top:22px; }
.eps-ttl { font-family:'Outfit',sans-serif; font-size:16px; font-weight:800; margin-bottom:14px; }

.seas-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:16px; }
.seas-btn {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1);
  border-radius:8px; padding:5px 14px; color:var(--mute); font-size:12px; font-weight:600;
  cursor:pointer; font-family:'Outfit',sans-serif; transition:all .2s;
}
.seas-btn.on { background:rgba(138,92,246,.22); border-color:rgba(138,92,246,.45); color:#fff; }

.eps-scroll { display:flex; gap:11px; overflow-x:auto; padding-bottom:8px; scroll-snap-type:x mandatory; }
.eps-scroll::-webkit-scrollbar { height:3px; }
.eps-scroll::-webkit-scrollbar-thumb { background:rgba(138,92,246,.35); border-radius:2px; }

.ep-card {
  flex-shrink:0; width:185px; border-radius:10px; overflow:hidden;
  background:var(--card); border:1px solid rgba(255,255,255,.06);
  cursor:pointer; transition:all .22s; scroll-snap-align:start;
}
.ep-card:hover { transform:translateY(-4px); border-color:rgba(138,92,246,.4); box-shadow:0 12px 28px rgba(0,0,0,.4); }

.ep-thumb { position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--panel); }
.ep-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.ep-thumb-ov {
  position:absolute; inset:0; background:rgba(0,0,0,.38);
  display:flex; align-items:center; justify-content:center; opacity:0; transition:.2s;
}
.ep-card:hover .ep-thumb-ov { opacity:1; }
.ep-play-ic { width:38px; height:38px; background:rgba(138,92,246,.9); border-radius:50%; display:flex; align-items:center; justify-content:center; }
.ep-play-ic svg { width:14px; height:14px; fill:#fff; margin-left:3px; }

.ep-info { padding:9px 11px 11px; }
.ep-num { font-size:10px; color:var(--vl); font-weight:700; font-family:'Outfit',sans-serif; margin-bottom:2px; }
.ep-title { font-size:12px; font-weight:700; line-height:1.35; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ep-desc { font-size:10px; color:var(--mute); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

/* ═══════════════ PLAYER ═══════════════ */
#L-player { z-index:300; background:#000; }

/* SUBTITLE OVERLAY */
#subOverlay {
  position:absolute; bottom:20px; left:0; right:0;
  text-align:center; pointer-events:none; z-index:10;
  padding:0 10%;
  transition:bottom .2s;
}
#subOverlay span {
  display:inline-block;
  color:#fff;
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(15px,3.8vw,24px);
  font-weight:500;
  line-height:1.55;
  padding:2px 8px;
  max-width:100%;
  white-space:pre-wrap;
  text-shadow:
    0 0 8px rgba(0,0,0,1),
    0 1px 4px rgba(0,0,0,.9),
    0 2px 10px rgba(0,0,0,.8),
    1px 1px 0 rgba(0,0,0,.9),
    -1px -1px 0 rgba(0,0,0,.9),
    1px -1px 0 rgba(0,0,0,.9),
    -1px 1px 0 rgba(0,0,0,.9);
  letter-spacing:.02em;
}
/* Move subtitle up when controls visible */
#L-player:not(.ctrls-hidden) #subOverlay { bottom:78px; }

#vid { width:100%; height:100%; object-fit:fill; background:#000; display:block; }

.p-spin {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:52px; height:52px; border:3px solid rgba(255,255,255,.15);
  border-top-color:var(--v); border-radius:50%; animation:spin .7s linear infinite; display:none;
}
.p-spin.on { display:block; }
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

.p-tap-anim {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:72px; height:72px; background:rgba(138,92,246,.7);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0;
}
.p-tap-anim.boom { animation:tapBoom .5s forwards; }
@keyframes tapBoom { 0%{opacity:1;transform:translate(-50%,-50%) scale(.5)} 40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.3)} }

.p-top {
  position:absolute; top:0; left:0; right:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,transparent);
  padding:14px 16px; display:flex; align-items:center; gap:14px;
  transition:opacity .3s;
}
.p-top.hide,.p-ctrls.hide { opacity:0; pointer-events:none; }

.p-back {
  background:none; border:none; color:#fff; cursor:pointer;
  display:flex; align-items:center; gap:7px; font-size:14px; font-weight:600;
  font-family:'Outfit',sans-serif; padding:6px 10px; border-radius:8px; transition:.2s;
}
.p-back:hover { background:rgba(255,255,255,.1); }
.p-vid-title { flex:1; font-family:'Outfit',sans-serif; font-size:15px; font-weight:700; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

.p-ctrls {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent);
  padding:16px 16px 14px; transition:opacity .3s;
}

.prog-wrap { margin-bottom:12px; position:relative; padding:6px 0; cursor:pointer; }
.prog-track { height:3px; background:rgba(255,255,255,.2); border-radius:2px; position:relative; transition:height .2s; }
.prog-wrap:hover .prog-track { height:5px; }
.prog-fill { height:100%; background:linear-gradient(to right,var(--v),var(--pink)); border-radius:2px; pointer-events:none; }
.prog-knob {
  position:absolute; top:50%; transform:translate(-50%,-50%) scale(0);
  width:14px; height:14px; background:#fff; border-radius:50%;
  pointer-events:none; transition:transform .2s;
}
.prog-wrap:hover .prog-knob { transform:translate(-50%,-50%) scale(1); }
.prog-buf { position:absolute; top:0; left:0; height:100%; background:rgba(255,255,255,.12); border-radius:2px; pointer-events:none; }

.ctrl-row { display:flex; align-items:center; gap:8px; }
.cbtn {
  background:none; border:none; color:#fff; cursor:pointer;
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  border-radius:8px; transition:background .2s; flex-shrink:0;
}
.cbtn:hover { background:rgba(255,255,255,.14); }
.cbtn svg { width:21px; height:21px; fill:#fff; }
.cbtn.sm svg { width:17px; height:17px; }

.skip-lbl { font-family:'Outfit',sans-serif; font-size:10px; font-weight:800; }
.time-txt { font-size:12px; color:rgba(255,255,255,.8); font-family:'Outfit',sans-serif; font-variant-numeric:tabular-nums; flex-shrink:0; }
.ctrl-sp { flex:1; }

.vol-wrap { display:flex; align-items:center; gap:7px; }
.vol-sl { -webkit-appearance:none; width:76px; height:3px; background:rgba(255,255,255,.2); border-radius:2px; outline:none; cursor:pointer; }
.vol-sl::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#fff; border-radius:50%; }

/* POPUPS */
.p-popups { position:absolute; bottom:72px; right:14px; display:flex; gap:8px; align-items:flex-end; }
.popup {
  background:rgba(16,14,38,0.97); backdrop-filter:blur(22px);
  border:1px solid rgba(138,92,246,.28); border-radius:12px; padding:6px 0;
  min-width:136px; display:none; max-height:260px; overflow-y:auto;
}
.popup.on { display:block; }
.popup::-webkit-scrollbar { width:3px; }
.popup::-webkit-scrollbar-thumb { background:rgba(138,92,246,.3); }
.pop-hdr { font-size:10px; font-weight:800; font-family:'Outfit',sans-serif; color:var(--mute); text-transform:uppercase; letter-spacing:1px; padding:5px 13px 8px; border-bottom:1px solid rgba(255,255,255,.06); margin-bottom:3px; }
.pop-item { padding:7px 13px; font-size:13px; cursor:pointer; transition:background .15s; display:flex; align-items:center; justify-content:space-between; gap:8px; }
.pop-item:hover { background:rgba(138,92,246,.2); }
.pop-item.sel { color:var(--vl); font-weight:700; }
.pop-dot { width:7px; height:7px; border-radius:50%; background:var(--v); display:none; flex-shrink:0; }
.pop-item.sel .pop-dot { display:block; }

/* LOADING */
#L-load {
  position:fixed; inset:0; z-index:999;
  background:var(--ink); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  transition:opacity .4s;
}
#L-load.bye { opacity:0; pointer-events:none; }

.load-logo { width:70px; height:70px; border-radius:20px; background:linear-gradient(135deg,var(--v),var(--pink)); display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 8px 32px rgba(138,92,246,.5); animation:loadFloat 2s ease-in-out infinite; }
@keyframes loadFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.load-name { font-family:'Outfit',sans-serif; font-size:22px; font-weight:900; background:linear-gradient(135deg,#fff,var(--vl)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.load-bar { width:180px; height:2px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
.load-bar-fill { height:100%; background:linear-gradient(to right,var(--v),var(--pink)); animation:loadBar 1.4s ease-in-out infinite; }
@keyframes loadBar { 0%{transform:translateX(-100%)} 100%{transform:translateX(250%)} }

/* TOAST */
#toast {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(70px);
  background:rgba(18,17,42,.97); border:1px solid var(--border); border-radius:12px;
  padding:10px 18px; font-size:13px; z-index:9999; transition:transform .3s;
  white-space:nowrap; pointer-events:none; max-width:90vw; text-align:center;
}
#toast.up { transform:translateX(-50%) translateY(0); }

/* RESUME TOAST */
#resumeToast {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(120px);
  background:rgba(13,12,30,.97); border:1px solid rgba(138,92,246,.4); border-radius:14px;
  padding:12px 16px; z-index:9999; transition:transform .35s;
  display:flex; align-items:center; gap:10px; max-width:94vw; flex-wrap:wrap;
}
#resumeToast.up { transform:translateX(-50%) translateY(0); }
#resumeToast span { font-size:13px; color:var(--txt); }
#resumeToast b { color:var(--vl); }
#resumeToast button {
  background:linear-gradient(135deg,var(--v),var(--vd)); border:none; border-radius:8px;
  color:#fff; padding:6px 14px; font-size:12px; font-family:'Outfit',sans-serif;
  font-weight:700; cursor:pointer;
}
#resumeToast button:last-child { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15); }

/* SIDEBAR OVERLAY (mobile) */
.s-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:99; }

/* EMPTY */
.empty { text-align:center; padding:50px 20px; color:var(--mute); }
.empty-ico { font-size:44px; margin-bottom:14px; opacity:.5; }
.empty h3 { font-family:'Outfit',sans-serif; font-size:17px; font-weight:700; color:var(--txt); margin-bottom:6px; }

/* ─── TRAILER FLOTANTE ─── */
#trailerFloat {
  display:none;
  position:fixed;
  bottom:24px; right:20px;
  width:300px;
  background:#0d0c1e;
  border:1px solid rgba(138,92,246,.4);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 12px 48px rgba(0,0,0,.8), 0 0 0 1px rgba(138,92,246,.12);
  z-index:600;
  user-select:none;
  transition:box-shadow .2s;
}
#trailerFloat.active { display:block; animation:floatIn .3s ease; }
@keyframes floatIn { from{opacity:0;transform:translateY(20px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }

#trailerDrag {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px;
  background:rgba(138,92,246,.18);
  cursor:grab;
  border-bottom:1px solid rgba(255,255,255,.07);
}
#trailerDrag:active { cursor:grabbing; }
#trailerLabel { font-family:'Outfit',sans-serif; font-size:12px; font-weight:700; color:#c4b5fd; }
#trailerDrag button {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.15);
  border-radius:6px; color:#fff; padding:3px 8px; font-size:13px; cursor:pointer;
  transition:background .15s;
}
#trailerDrag button:hover { background:rgba(255,255,255,.22); }
#trailerDrag button:last-child { background:rgba(220,50,50,.22); border-color:rgba(255,80,80,.3); }

#trailerScreen {
  position:relative; aspect-ratio:16/9; background:#000; overflow:hidden;
}
#trailerScreen video,
#trailerScreen iframe {
  position:absolute; inset:0; width:100%; height:100%; border:none;
  object-fit:contain;
}
/* Fill stretch mode para trailer */
#trailerFloat.fill-mode #trailerScreen video,
#trailerFloat.fill-mode #trailerScreen iframe { object-fit:fill; transform:scale(1.005); }

/* ─── GOOGLE DRIVE IFRAME FILL ─── */
#driveFr { object-fit:fill; }
#L-player.drive-fill #driveFr { transform:scale(1.005); }
/* Ocultar controles nativos cuando es Drive (no aplican) */
#L-player.drive-mode .prog-wrap,
#L-player.drive-mode #playBtn,
#L-player.drive-mode .cbtn[onclick*="skip"],
#L-player.drive-mode .vol-wrap,
#L-player.drive-mode #timeTxt {
  opacity:.35; pointer-events:none;
}
#L-player.drive-mode #subOverlay { z-index:2; }
@media(max-width:768px) {
  .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); z-index:200; }
  .sidebar.open { transform:translateX(0); }
  .s-ov.show { display:block; }
  :root { --sw:0px; }
  .topbar-menu-btn { display:flex; }
  .hero-body { max-width:100%; padding:0 16px 22px; }
  .c-section { padding:16px 14px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(105px,1fr)); gap:9px; }
  #L-detail { padding:10px; }
  .det-box { border-radius:14px; }
  .det-body { padding:14px 15px 22px; }
  .ep-card { width:155px; }
  .vol-wrap { display:none; }
  .p-popups { bottom:68px; }
  .p-vid-title { font-size:13px; }
}

/* Pantallas muy pequeñas (< 360px) – escala todo un poco hacia abajo */
@media(max-width:359px) {
  html { font-size:13px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:7px; }
  .login-card { flex-direction:column; width:92vw; min-height:unset; }
  .login-left { width:100%; min-width:unset; padding:22px 20px 16px; border-right:none; border-bottom:1px solid rgba(138,92,246,.18); flex-direction:row; gap:14px; justify-content:flex-start; }
  .login-logo { width:44px; height:44px; font-size:20px; flex-shrink:0; }
  .login-h { font-size:18px; text-align:left; }
  .login-sub,.login-dots { display:none; }
  .login-right { padding:18px 20px 22px; }
}

/* Login apilado en pantallas angostas landscape tipo teléfono pequeño */
@media(max-height:420px) and (max-width:768px){
  .login-card { max-height:96vh; overflow-y:auto; }
  .login-left { padding:16px 20px 12px; }
  .login-right { padding:16px 20px 16px; }
}

/* Pantallas medianas tipo tablet */
@media(min-width:769px) and (max-width:1024px) {
  :root { --sw:200px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
}

/* TV / pantallas grandes (> 1400px) */
@media(min-width:1400px) {
  :root { --sw:260px; }
  html { font-size:17px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:18px; }
  .pcard { border-radius:16px; }
  .topbar { padding:18px 32px; }
  .c-section { padding:28px 32px; }
  .hero { height:clamp(320px,40vw,580px); }
  .det-box { max-width:1100px; }
  .det-back { height:clamp(280px,35vw,480px); }
  .ep-card { width:240px; }
}

/* TV 4K / pantallas muy grandes (> 1900px) */
@media(min-width:1900px) {
  html { font-size:20px; }
  :root { --sw:300px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:22px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="L-load">
  <div class="load-logo">🎬</div>
  <div class="load-name">CineStream</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
</div>

<!-- TOAST -->
<div id="toast"></div>
<!-- RESUME TOAST -->
<div id="resumeToast"></div>

<!-- SIDEBAR OVERLAY -->
<div class="s-ov" id="s-ov" onclick="closeSidebar()"></div>

<!-- ██ LAYER 1 – LOGIN ██ -->
<div class="layer" id="L-login">
  <canvas class="stars-canvas" id="starsCanvas"></canvas>
  <div class="film-strip" id="filmStrip"></div>
  <div class="login-card">
    <!-- LEFT: branding -->
    <div class="login-left">
      <div class="login-logo">🎬</div>
      <div class="login-h" id="loginAppName">CineStream</div>
      <div class="login-sub">Tu plataforma de<br>streaming personal</div>
      <div class="login-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <!-- RIGHT: form -->
    <div class="login-right">
      <div class="login-form-title">Iniciar sesión</div>
      <div class="fgrp">
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="Escribe tu usuario" autocomplete="username">
      </div>
      <div class="fgrp">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="Escribe tu contraseña" autocomplete="current-password">
      </div>
      <button class="btn-enter" onclick="doLogin()">▶ Entrar</button>
      <div class="login-err" id="login-err">⚠ Usuario o contraseña incorrectos</div>
    </div>
  </div>
</div>

<!-- ██ LAYER 2 – APP ██ -->
<div class="layer off" id="L-app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="s-logo">
      <div class="s-logo-icon">🎬</div>
      <div class="s-logo-name" id="appNameLbl">CineStream</div>
    </div>
    <div style="flex:1;overflow-y:auto;overflow-x:hidden;">
      <div class="s-section-lbl">Menú</div>
      <div class="s-item on" id="nav-home" onclick="goTo('home')">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio
      </div>
      <div class="s-item" id="nav-movies" onclick="goTo('movies')">
        <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>Películas
      </div>
      <div class="s-item" id="nav-series" onclick="goTo('series')">
        <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>Series
      </div>
    </div>
    <div class="s-bottom">
      <div class="s-item" onclick="doLogout()">
        <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>Salir
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="topbar">
      <button class="topbar-menu-btn" onclick="openSidebar()">
        <svg width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">Inicio</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInp" placeholder="Buscar película o serie..." oninput="doSearch(this.value)">
      </div>
    </div>
    <div id="contentArea"></div>
  </div>
</div>

<!-- ██ TRAILER FLOTANTE ██ -->
<div id="trailerFloat">
  <div id="trailerDrag">
    <span id="trailerLabel">🎬 Tráiler</span>
    <div style="display:flex;gap:5px;align-items:center;">
      <button id="trailerSoundBtn" onclick="trailerToggleSound()" title="Sonido">🔇</button>
      <button onclick="closeTrailer()" title="Cerrar">✕</button>
    </div>
  </div>
  <div id="trailerScreen">
    <video id="trailerVid" playsinline muted></video>
    <iframe id="trailerFr" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
  </div>
</div>

<!-- ██ LAYER 3 – DETAIL ██ -->
<div class="layer off" id="L-detail">
  <div class="det-box" id="detBox">
    <div class="det-back">
      <img id="detBackImg" src="" alt="" class="det-back-img" onerror="this.src='';this.style.opacity='0'">
      <div class="det-back-grad"></div>
      <button class="det-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="det-body">
      <div class="det-ttl" id="detTitle">—</div>
      <div class="det-meta" id="detMeta"></div>
      <div class="det-genres" id="detGenres"></div>
      <div class="det-syn" id="detSyn">Cargando información…</div>
      <div class="det-acts" id="detActs"></div>
      <div id="detEps"></div>
    </div>
  </div>
</div>

<!-- ██ LAYER 4 – PLAYER ██ -->
<div class="layer off" id="L-player">
  <video id="vid" playsinline webkit-playsinline></video>
  <iframe id="driveFr" src="" frameborder="0" allowfullscreen
    allow="autoplay; encrypted-media"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-presentation"
    style="display:none;position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;z-index:1;">
  </iframe>
  <div id="subOverlay"></div>
  <div class="p-spin" id="pSpin"></div>
  <div class="p-tap-anim" id="tapAnim">
    <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>

  <!-- Top -->
  <div class="p-top" id="pTop">
    <button class="p-back" onclick="closePlayer()">
      <svg width="19" height="19" fill="white" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Volver
    </button>
    <div class="p-vid-title" id="pTitleTxt"></div>
  </div>

  <!-- Popups -->

/* ═══════════════════════════════════════
   STARS CANVAS
═══════════════════════════════════════ */
(function initStars(){
  const c = document.getElementById('starsCanvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize(); addEventListener('resize', resize);
  for(let i=0;i<120;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,a:Math.random(),da:(.002+Math.random()*.003)*(Math.random()<.5?1:-1)});
  function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a=Math.max(.05,Math.min(1,s.a+s.da));
      if(s.a<=.05||s.a>=1) s.da=-s.da;
      ctx.beginPath(); ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,190,255,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
  // Film strip holes
  const fs = document.getElementById('filmStrip');
  for(let i=0;i<30;i++){ const d=document.createElement('div'); d.className='film-hole'; fs.appendChild(d); }
})();

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
async function doLogin(){
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  const err  = document.getElementById('login-err');
  err.style.display = 'none';

  // Check user against local users array first
  const validLocal = CFG.users.find(u=> u.user===user && u.pass===pass);

  if(!CFG.jsonUrl){ // DEMO MODE
    if(!validLocal){ err.style.display='block'; return; }
    loadDemoData(); enterApp(); return;
  }

  try{
    const res = await fetch(CFG.jsonUrl, {cache:'no-cache'});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // Check against JSON users array OR local CFG.users
    const jsonUsers = data.config?.users || (data.config?.user ? [{user:data.config.user,pass:data.config.password}] : []);
    const validJson = jsonUsers.find(u=> u.user===user && u.pass===pass);
    if(!validLocal && !validJson){ err.style.display='block'; return; }
    if(data.config?.app_name){
      document.getElementById('appNameLbl').textContent = data.config.app_name;
      document.title = data.config.app_name;
    }
    S.movies = data.movies||[];
    S.series = data.series||[];
    enterApp();
  }catch(e){
    err.textContent = '⚠ Error cargando JSON: '+e.message;
    err.style.display = 'block';
  }
}

function goTo(section){

  document.getElementById('searchInp').value = '';

/* ═══════════════════════════════════════
   TMDB
═══════════════════════════════════════ */
async function tmdb(type, id){
  if(!CFG.tmdbKey||!id) return null;
  const k=type+id;
  if(S.cache[k]) return S.cache[k];
  try{
    const r = await fetch(`${CFG.tmdbBase}/${type}/${id}?api_key=${CFG.tmdbKey}&language=es-MX`);
    if(!r.ok) return null;
    const d = await r.json();
    S.cache[k]=d; return d;
  }catch{ return null; }
}

async function tmdbSeason(seriesId, seasonNum){
  if(!CFG.tmdbKey||!seriesId) return null;
  const k=`tvS_${seriesId}_${seasonNum}`;
  if(S.cache[k]) return S.cache[k];
  try{
    const r = await fetch(`${CFG.tmdbBase}/tv/${seriesId}/season/${seasonNum}?api_key=${CFG.tmdbKey}&language=es-MX`);
    if(!r.ok) return null;
    const d = await r.json();
    S.cache[k]=d; return d;
  }catch{ return null; }
}

/* ═══════════════════════════════════════
   HOME
═══════════════════════════════════════ */
async function renderHome(){
  const area = $('contentArea');
  const allItems = [...S.movies.map(m=>({...m,type:'movie'})), ...S.series.map(s=>({...s,type:'series'}))];
  const feat = allItems.length ? allItems[Math.floor(Math.random()*Math.min(4,allItems.length))] : null;
  
  let heroHtml = '';
  if(feat){
    let bg=feat.backdrop||'', ov=feat.description||'', rt='', yr=feat.year||'';
    if(CFG.tmdbKey && feat.tmdb_id){
      const td = await tmdb(feat.type==='movie'?'movie':'tv', feat.tmdb_id);
      if(td){
        bg = bg||(td.backdrop_path? CFG.imgW1280+td.backdrop_path:'');
        ov = ov||td.overview||'';
        rt = td.vote_average? td.vote_average.toFixed(1):'';
        if(!yr){ const df=td.release_date||td.first_air_date; if(df) yr=df.split('-')[0]; }
      }
    }
    heroHtml=`
    <div class="hero">
      <div class="hero-bg" style="background-image:url('${bg||''}')"></div>
      <div class="hero-grad"></div>
      <div class="hero-body">
        <div class="hero-tag">✦ ${feat.type==='movie'?'PELÍCULA':'SERIE'} DESTACADA</div>
        <div class="hero-ttl">${feat.title}</div>
        <div class="hero-meta">
          ${yr?`<span>${yr}</span>`:''}
          ${rt?`<span class="hero-stars">★ ${rt}</span>`:''}
        </div>
        ${ov?`<div class="hero-desc">${ov}</div>`:''}
        <div class="hero-btns">
          <button class="btn-play" onclick="openDetail('${feat.id}','${feat.type}')">▶ Ver ahora</button>
          <button class="btn-info" onclick="openDetail('${feat.id}','${feat.type}')">ℹ Más info</button>
        </div>
      </div>
    </div>`;
  }

  area.innerHTML = heroHtml+`
  <div class="c-section">
    <div class="c-hdr"><div class="c-hdr-lft"><span class="c-hdr-title">🎬 Películas</span><span class="c-count">${S.movies.length}</span></div></div>
    <div class="grid" id="grid-hmov"></div>
  </div>
  <div class="c-section">
    <div class="c-hdr"><div class="c-hdr-lft"><span class="c-hdr-title">📺 Series</span><span class="c-count">${S.series.length}</span></div></div>
    <div class="grid" id="grid-hser"></div>
  </div>`;

  renderPosters('grid-hmov', S.movies.slice(0,14), 'movie');
  renderPosters('grid-hser', S.series.slice(0,10), 'series');
}

/* ═══════════════════════════════════════
   GRID
═══════════════════════════════════════ */
function renderGrid(type){
  const items = type==='movies'?S.movies:S.series;
  const itype = type==='movies'?'movie':'series';
  $('contentArea').innerHTML=`
  <div class="c-section">
    <div class="c-hdr"><div class="c-hdr-lft"><span class="c-hdr-title">${type==='movies'?'🎬 Todas las Películas':'📺 Todas las Series'}</span><span class="c-count">${items.length}</span></div></div>
    <div class="grid" id="grid-main"></div>
  </div>`;
  renderPosters('grid-main', items, itype);
}

/* ═══════════════════════════════════════
   RENDER POSTERS
═══════════════════════════════════════ */
async function renderPosters(gridId, items, type){
  const g = $(gridId); if(!g) return;
  if(!items.length){
    g.innerHTML=`<div class="empty"><div class="empty-ico">${type==='movie'?'🎬':'📺'}</div><h3>Sin contenido</h3><p>Agrega elementos a tu JSON</p></div>`;
    return;
  }
  // Render skeleton cards
  g.innerHTML = items.map(item=>`
    <div class="pcard" id="pc-${item.id}">
      <div class="skel" style="width:100%;height:100%"></div>
    </div>`).join('');

  for(const item of items){
    const card = $('pc-'+item.id); if(!card) continue;
    let poster=item.poster||'', rt=item.rating||'', yr=item.year||'';
    if(!poster && CFG.tmdbKey && item.tmdb_id){
      const td = await tmdb(type==='movie'?'movie':'tv', item.tmdb_id);
      if(td){
        poster = td.poster_path? CFG.imgW500+td.poster_path:'';
        if(!rt && td.vote_average) rt=td.vote_average.toFixed(1);
        if(!yr){ const df=td.release_date||td.first_air_date; if(df) yr=df.split('-')[0]; }
      }
    }
    card.innerHTML=`
      ${poster
        ?`<img src="${poster}" alt="${item.title}" loading="lazy" onerror="this.style.background='linear-gradient(135deg,#1b1935,#2e1065)';this.style.display='block'">`
        :`<div style="width:100%;height:100%;background:linear-gradient(135deg,#1b1935,#2e1065);display:flex;align-items:center;justify-content:center;padding:10px;text-align:center;font-family:Outfit,sans-serif;font-size:13px;font-weight:700;color:#c4b5fd">${item.title}</div>`}
      <div class="pcard-type">${type==='movie'?'Film':'Serie'}</div>
      ${rt?`<div class="pcard-rt">★ ${rt}</div>`:''}
      <div class="pcard-overlay">
        <div class="pcard-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="pcard-ptitle">${item.title}</div>
        ${yr?`<div class="pcard-pyear">${yr}</div>`:''}
      </div>`;
    card.onclick=()=>openDetail(item.id, type);
  }
}

/* ═══════════════════════════════════════
   DETAIL
═══════════════════════════════════════ */
async function openDetail(id, type){
  const item = type==='movie'? S.movies.find(m=>m.id==id) : S.series.find(s=>s.id==id);
  if(!item) return;
  S.item = {...item, type};

  show('L-detail');
  $('L-detail').scrollTop=0;

  // Set initial state
  $('detTitle').textContent = item.title;
  $('detSyn').textContent   = item.description||'Cargando información…';
  $('detMeta').innerHTML    = '';
  $('detGenres').innerHTML  = '';
  // Reset backdrop
  const bImg = $('detBackImg');
  bImg.style.opacity = '0';
  bImg.onload = ()=>{ bImg.style.opacity='1'; };
  bImg.src = item.backdrop||'';
  $('detEps').innerHTML     = '';
  $('detActs').innerHTML    = `
    <button class="btn-play" onclick="${type==='movie'?`playMovie('${id}')`:`scrollToEps()`}">
      ▶ ${type==='movie'?'Reproducir':'Ver Episodios'}
    </button>
    ${item.trailer ? `<button class="btn-info" onclick="openTrailer('${item.trailer}')">🎬 Tráiler</button>` : ''}
  `;

  // Fetch TMDB
  const tdType = type==='movie'?'movie':'tv';
  const td = await tmdb(tdType, item.tmdb_id);

  if(td){
    const yr   = (td.release_date||td.first_air_date||'').split('-')[0];
    const rt   = td.vote_average? `★ ${td.vote_average.toFixed(1)}` : '';
    const mins = td.runtime? `${td.runtime} min` : (td.episode_run_time?.[0]? `~${td.episode_run_time[0]} min/ep`:'');
    const newBack = item.backdrop||(td.backdrop_path? CFG.imgW1280+td.backdrop_path:'');
    if(newBack){
      const bImg2 = $('detBackImg');
      bImg2.onload = ()=>{ bImg2.style.opacity='1'; };
      bImg2.onerror = ()=>{ bImg2.style.opacity='0'; };
      if(bImg2.src !== newBack) bImg2.src = newBack;
      else bImg2.style.opacity='1';
    }
    $('detTitle').textContent = td.title||td.name||item.title;
    $('detSyn').textContent   = item.description||td.overview||'Sin sinopsis disponible.';
    $('detMeta').innerHTML    = `
      ${yr?`<span class="det-yr">${yr}</span>`:''}
      ${rt?`<span class="det-rt">${rt}</span>`:''}
      ${mins?`<span class="det-tm">🕐 ${mins}</span>`:''}
      <span class="det-badge">${type==='movie'?'Película':'Serie'}</span>`;
    if(td.genres?.length)
      $('detGenres').innerHTML = td.genres.map(g=>`<span class="genre">${g.name}</span>`).join('');
    // Update trailer button if item has trailer
    $('detActs').innerHTML = `
      <button class="btn-play" onclick="${type==='movie'?`playMovie('${id}')`:`scrollToEps()`}">
        ▶ ${type==='movie'?'Reproducir':'Ver Episodios'}
      </button>
      ${item.trailer ? `<button class="btn-info" onclick="openTrailer('${item.trailer}')">🎬 Tráiler</button>` : ''}
    `;
  } else {
    $('detSyn').textContent = item.description||'Sin sinopsis disponible.';
    $('detMeta').innerHTML  = `${item.year?`<span class="det-yr">${item.year}</span>`:''}<span class="det-badge">${type==='movie'?'Película':'Serie'}</span>`;
  }

  // Episodes
  if(type==='series' && item.seasons?.length) renderEps(item, td);
}

function closeDetail(){ hide('L-detail'); S.item=null; }
function scrollToEps(){ $('detEps')?.scrollIntoView({behavior:'smooth'}); }

/* ═══════════════════════════════════════
   EPISODES
═══════════════════════════════════════ */
async function renderEps(series, td){
  const c = $('detEps'); if(!c) return;
  c.innerHTML=`
  <div class="eps-section" id="epsSection">
    <div class="eps-ttl">📋 Episodios</div>
    <div class="seas-row" id="seasRow">${series.seasons.map((s,i)=>`<button class="seas-btn ${i===0?'on':''}" onclick="switchSeason(${i})">${s.name||'Temporada '+s.season_number}</button>`).join('')}</div>
    <div class="eps-scroll" id="epsScroll"></div>
  </div>`;
  await loadSeasonEps(series, 0, td);
}

async function switchSeason(idx){
  document.querySelectorAll('.seas-btn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  if(!S.item) return;
  const td = S.item.tmdb_id && CFG.tmdbKey ? await tmdb('tv', S.item.tmdb_id) : null;
  await loadSeasonEps(S.item, idx, td);
}

async function loadSeasonEps(series, sIdx, td){
  const scroll = $('epsScroll'); if(!scroll) return;
  const season = series.seasons[sIdx]; if(!season) return;

  // Skeleton
  scroll.innerHTML = season.episodes.map(()=>`<div class="ep-card"><div class="ep-thumb skel" style="aspect-ratio:16/9"></div><div class="ep-info"><div class="skel" style="height:10px;border-radius:4px;width:50%;margin-bottom:6px"></div><div class="skel" style="height:12px;border-radius:4px;margin-bottom:4px"></div><div class="skel" style="height:10px;border-radius:4px;width:70%"></div></div></div>`).join('');

  // Fetch TMDB season
  let tmdbEps = [];
  if(CFG.tmdbKey && series.tmdb_id){
    const sd = await tmdbSeason(series.tmdb_id, season.season_number);
    if(sd) tmdbEps = sd.episodes||[];
  }

  scroll.innerHTML = season.episodes.map((ep,i)=>{
    const te = tmdbEps.find(e=>e.episode_number===ep.episode_number)||tmdbEps[i]||{};
    const thumb = ep.thumbnail||(te.still_path? 'https://image.tmdb.org/t/p/w300'+te.still_path:'');
    const ttl   = ep.title||te.name||`Episodio ${ep.episode_number}`;
    const desc  = ep.description||te.overview||'';
    return `
    <div class="ep-card" onclick="playEpisode('${series.id}',${sIdx},${i})">
      <div class="ep-thumb">
        ${thumb?`<img src="${thumb}" alt="${ttl}" loading="lazy" onerror="this.parentElement.style.background='linear-gradient(135deg,#1b1935,#2e1065)'">`:
          `<div style="width:100%;height:100%;background:linear-gradient(135deg,#1b1935,#2e1065);display:flex;align-items:center;justify-content:center;font-size:22px">▶</div>`}
        <div class="ep-thumb-ov"><div class="ep-play-ic"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      </div>
      <div class="ep-info">
        <div class="ep-num">S${season.season_number}E${ep.episode_number}</div>
        <div class="ep-title">${ttl}</div>
        ${desc?`<div class="ep-desc">${desc}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function playEpisode(seriesId, sIdx, eIdx){

function openPlayer(url, title, qualities, subtitles, audioTracks, saveKey){

/* ─── Google Drive URL helper ─── */
function isDriveUrl(url){
  return url && /drive\.google\.com/i.test(url);
}
function drivePreviewUrl(url){
  // Support various drive URL formats → always use /preview
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  // Already a preview URL
  if(url.includes('/preview')) return url;
  return url;
}

function loadVideo(url){
  const v=$('vid');
  const fr=$('driveFr');
  const pl=$('L-player');
  $('pSpin').classList.add('on');
  Sub.stop();
  if(S.hls){ S.hls.destroy(); S.hls=null; }
  if(!url){ $('pSpin').classList.remove('on'); toast('⚠ URL no configurada en el JSON'); return; }

  // ─── GOOGLE DRIVE MODE ───
  if(isDriveUrl(url)){
    v.pause(); v.src=''; v.style.display='none';
    fr.src = drivePreviewUrl(url);
    fr.style.display='block';
    pl.classList.add('drive-mode');
    // Apply fill stretch if active
    if(vidFill) pl.classList.add('drive-fill');
    fr.onload = ()=>{ $('pSpin').classList.remove('on'); };
    setTimeout(()=>$('pSpin').classList.remove('on'), 4000); // fallback
    toast('▶ Reproduciendo desde Google Drive');
    updPlayBtn();
    return;
  }

  // ─── NORMAL VIDEO MODE ───
  fr.src=''; fr.style.display='none';
  v.style.display='block';
  pl.classList.remove('drive-mode','drive-fill');

  if(Hls.isSupported() && /m3u8/i.test(url)){
    const h = new Hls({
      enableWorker: true,
      maxBufferLength: 30,
      maxMaxBufferLength: 90,
      maxBufferSize: 60*1000*1000,
      maxBufferHole: 0.5,
      lowLatencyMode: false,
      backBufferLength: 30,
      audioPreloadCount: 2,
      startLevel: -1,
      abrEwmaDefaultEstimate: 500000,
    });
    h.loadSource(url);
    h.attachMedia(v);
    h.on(Hls.Events.MANIFEST_PARSED,()=>{
      v.play().catch(()=>{});
      $('pSpin').classList.remove('on');
      resumeSaved(v);
    });
    h.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal){
        $('pSpin').classList.remove('on');
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR) h.startLoad();
        else if(d.type===Hls.ErrorTypes.MEDIA_ERROR) h.recoverMediaError();
      }
    });
    S.hls=h;
  } else {
    v.src=url; v.load(); v.play().catch(()=>{});
    $('pSpin').classList.remove('on');
    v.addEventListener('loadedmetadata',()=>resumeSaved(v),{once:true});
  }
  updPlayBtn();
}

function resumeSaved(v){
  const saved = Progress.get(S.currentSaveKey);
  if(!saved || saved.t < 5) return;
  const mins = Math.floor(saved.t/60), secs = saved.t%60;
  const label = mins>0 ? `${mins}m ${secs}s` : `${secs}s`;
  // Show resume toast with action
  showResumeToast(label, ()=>{ v.currentTime=saved.t; toast('▶ Continuando desde '+label); });
}

/* ═══════════════════════════════════════
   SUBTITLE ENGINE (VTT + SRT, funciona en móvil)
═══════════════════════════════════════ */
const Sub = {
  cues:    [],    // [{start, end, text}]
  blobUrl: null,  // cleanup
  raf:     null,
  enabled: false,

  // ─ Parse timestamps ─
  timeToSec(t){
    // HH:MM:SS,mmm or HH:MM:SS.mmm or MM:SS.mmm
    t = t.trim().replace(',','.');
    const p = t.split(':');
    if(p.length===3) return parseFloat(p[0])*3600 + parseFloat(p[1])*60 + parseFloat(p[2]);
    if(p.length===2) return parseFloat(p[0])*60 + parseFloat(p[1]);
    return parseFloat(t);
  },

  // ─ Strip VTT tags <b>, <i>, <c.xxx>, etc ─
  stripTags(t){ return t.replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' '); },

  // ─ Parse SRT ─
  parseSRT(txt){
    const cues=[];
    const blocks = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split(/\n\n+/);
    for(const b of blocks){
      const lines = b.split('\n').filter(l=>l.trim());
      if(lines.length<2) continue;
      // skip index line if present
      const ti = lines.findIndex(l=>l.includes('-->'));
      if(ti<0) continue;
      const [s,e] = lines[ti].split('-->');
      const text  = lines.slice(ti+1).map(l=>this.stripTags(l)).join('\n');
      if(text) cues.push({start:this.timeToSec(s), end:this.timeToSec(e), text});
    }
    return cues;
  },

  // ─ Parse VTT ─
  parseVTT(txt){
    const cues=[];
    const blocks = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split(/\n\n+/);
    for(const b of blocks){
      if(b.startsWith('WEBVTT')||b.startsWith('NOTE')||b.startsWith('STYLE')||b.startsWith('REGION')) continue;
      const lines = b.split('\n').filter(l=>l.trim());
      const ti = lines.findIndex(l=>l.includes('-->'));
      if(ti<0) continue;
      const arrow = lines[ti].split('-->');
      const s = arrow[0].trim();
      const e = (arrow[1]||'').split(/\s/)[0].trim(); // ignore position tags
      const text = lines.slice(ti+1).map(l=>this.stripTags(l)).join('\n');
      if(text) cues.push({start:this.timeToSec(s), end:this.timeToSec(e), text});
    }
    return cues;
  },

  // ─ Load subtitle from URL ─
  async load(url, label){
    this.stop();
    this.cues=[];
    $('subOverlay').innerHTML='';
    if(!url){ toast('Subtítulos desactivados'); return; }

    toast('⏳ Cargando subtítulos…');
    try{
      // Fetch with cache-busting to avoid stale files on GitHub
      const res = await fetch(url, {cache:'no-cache'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const txt  = await res.text();
      const isVTT = url.toLowerCase().includes('.vtt') || txt.trimStart().startsWith('WEBVTT');
      this.cues = isVTT ? this.parseVTT(txt) : this.parseSRT(txt);
      if(!this.cues.length) throw new Error('Sin cues encontradas');
      this.enabled = true;
      this.start();
      toast(`✅ Subtítulos: ${label||'cargados'} (${this.cues.length} líneas)`);
    }catch(e){
      toast('⚠ Error subtítulos: '+e.message);
      console.warn('Sub error:',e);
    }
  },

  // ─ Render loop ─
  start(){
    const v=$('vid'), el=$('subOverlay');
    let lastTxt='';
    const tick=()=>{
      if(!this.enabled){ el.innerHTML=''; return; }
      const t = v.currentTime;
      const cue = this.cues.find(c=> t>=c.start && t<=c.end);
      const txt = cue? cue.text : '';
      if(txt!==lastTxt){
        el.innerHTML = txt? `<span>${txt}</span>` : '';
        lastTxt=txt;
      }
      this.raf=requestAnimationFrame(tick);
    };
    this.raf=requestAnimationFrame(tick);
  },

  stop(){
    this.enabled=false;
    if(this.raf){ cancelAnimationFrame(this.raf); this.raf=null; }
    const el=$('subOverlay'); if(el) el.innerHTML='';
  }
};

/* ═══════════════════════════════════════
   PROGRESS AUTOSAVE (localStorage)
═══════════════════════════════════════ */
const Progress = {
  key(id){ return 'cs_prog_'+id; },
  save(id, t, dur){
    if(!id||!t||t<5) return;
    const pct = dur>0? (t/dur) : 0;
    if(pct>0.97) { localStorage.removeItem(this.key(id)); return; } // finished = reset
    try{ localStorage.setItem(this.key(id), JSON.stringify({t:Math.floor(t),dur:Math.floor(dur),ts:Date.now()})); }catch(e){}
  },
  get(id){
    if(!id) return null;
    try{ const v=localStorage.getItem(this.key(id)); return v?JSON.parse(v):null; }catch(e){ return null; }
  },
  clear(id){ try{ localStorage.removeItem(this.key(id)); }catch(e){} }
};

}

(function initTrailerDrag(){
  const el=$('trailerFloat'), drag=$('trailerDrag');
  let ox=0,oy=0,ex=0,ey=0, active=false;
  function start(cx,cy){ active=true; ex=el.offsetLeft; ey=el.offsetTop; ox=cx-ex; oy=cy-ey; }
  function move(cx,cy){
    if(!active) return;
    ex=cx-ox; ey=cy-oy;
    // Clamp inside viewport
    ex=Math.max(0,Math.min(window.innerWidth-el.offsetWidth,ex));
    ey=Math.max(0,Math.min(window.innerHeight-el.offsetHeight,ey));
    el.style.right='auto'; el.style.bottom='auto';
    el.style.left=ex+'px'; el.style.top=ey+'px';
  }
  function end(){ active=false; }
  drag.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
  drag.addEventListener('touchstart',e=>{ const t=e.touches[0]; start(t.clientX,t.clientY); },{passive:true});
  document.addEventListener('touchmove',e=>{ const t=e.touches[0]; move(t.clientX,t.clientY); },{passive:true});
  document.addEventListener('touchend',end);
})();

/* ─ Video events ─ */
(function initVidEvents(){
  const v=$('vid'), pl=$('L-player');

  v.addEventListener('timeupdate',()=>{
    if(!v.duration) return;
    const p=(v.currentTime/v.duration)*100;
    $('progFill').style.width=p+'%';
    $('progKnob').style.left=p+'%';
    $('timeTxt').textContent=fmt(v.currentTime)+' / '+fmt(v.duration);
    if(v.buffered.length){ const b=(v.buffered.end(v.buffered.length-1)/v.duration)*100; $('progBuf').style.width=b+'%'; }
    // Autosave every 5s
    if(S.currentSaveKey && Math.floor(v.currentTime)%5===0) Progress.save(S.currentSaveKey, v.currentTime, v.duration);
  });
  v.addEventListener('play',updPlayBtn);
  v.addEventListener('pause',updPlayBtn);
  v.addEventListener('ended',updPlayBtn);
  v.addEventListener('waiting',()=>$('pSpin').classList.add('on'));
  v.addEventListener('playing',()=>$('pSpin').classList.remove('on'));
  v.addEventListener('canplay',()=>$('pSpin').classList.remove('on'));

  // Click area
  pl.addEventListener('click',e=>{
    if(e.target.closest('.p-ctrls')||e.target.closest('.p-top')||e.target.closest('.p-popups')) return;
    if($('popQuality').classList.contains('on')||$('popSub').classList.contains('on')){ closePopups(); return; }
    if($('pCtrls').classList.contains('hide')){ resetCtrlTimer(); return; }
    togglePlay();
  });
  pl.addEventListener('mousemove',resetCtrlTimer);
  pl.addEventListener('touchstart',resetCtrlTimer,{passive:true});

  // Keyboard
  document.addEventListener('keydown',e=>{
    if($('L-player').classList.contains('off')) return;
    if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if(e.key===' '||e.key==='k'){ e.preventDefault(); togglePlay(); }
    if(e.key==='ArrowLeft')  skip(-10);
    if(e.key==='ArrowRight') skip(10);
    if(e.key==='f') toggleFs();
    if(e.key==='Escape'&&!document.fullscreenElement) closePlayer();
  });
})();

function fmt(s){
  if(!s||isNaN(s)) return '0:00';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
  return h>0 ? `${h}:${p2(m)}:${p2(sec)}` : `${m}:${p2(sec)}`;
}
function p2(n){ return n.toString().padStart(2,'0'); }

/* ═══════════════════════════════════════
   SEARCH
═══════════════════════════════════════ */
function doSearch(q){
  q=q.trim();
  if(!q){ goTo(S.section); return; }
  S.searching=true;
  const ql=q.toLowerCase();
  const rm=S.movies.filter(m=>m.title.toLowerCase().includes(ql));
  const rs=S.series.filter(s=>s.title.toLowerCase().includes(ql));
  $('contentArea').innerHTML=`
  <div class="c-section">
    <div class="c-hdr"><div class="c-hdr-lft"><span class="c-hdr-title">🔍 "${q}"</span><span class="c-count">${rm.length+rs.length}</span></div></div>
    ${rm.length?`<div style="font-family:Outfit,sans-serif;font-size:13px;font-weight:700;color:var(--mute);margin-bottom:10px">Películas</div><div class="grid" id="sr-mov"></div>`:''}
    ${rs.length?`<div style="font-family:Outfit,sans-serif;font-size:13px;font-weight:700;color:var(--mute);margin-top:20px;margin-bottom:10px">Series</div><div class="grid" id="sr-ser"></div>`:''}
    ${!rm.length&&!rs.length?`<div class="empty"><div class="empty-ico">🔍</div><h3>Sin resultados</h3><p>No se encontró "${q}"</p></div>`:''}
  </div>`;
  if(rm.length) renderPosters('sr-mov',rm,'movie');
  if(rs.length) renderPosters('sr-ser',rs,'series');
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function $(id){ return document.getElementById(id); }
function show(id){ $(id).classList.remove('off'); }
function hide(id){ $(id).classList.add('off'); }
function openSidebar(){ $('sidebar').classList.add('open'); $('s-ov').classList.add('show'); }
function closeSidebar(){ $('sidebar').classList.remove('open'); $('s-ov').classList.remove('show'); }

let toastTimer;
function toast(msg){
  const el=$('toast'); el.textContent=msg;
  el.classList.add('up');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('up'),3200);
}

function showResumeToast(label, onResume){
  const el=$('resumeToast');
  el.innerHTML=`<span>Continuaste en <b>${label}</b></span><button onclick="doResume()">▶ Continuar</button><button onclick="dismissResume()">Desde inicio</button>`;
  el._cb = onResume;
  el.classList.add('up');
  clearTimeout(el._timer);
  el._timer = setTimeout(()=>el.classList.remove('up'), 9000);
}
function doResume(){ const el=$('resumeToast'); if(el._cb) el._cb(); el.classList.remove('up'); }
function dismissResume(){ $('resumeToast').classList.remove('up'); }

function showJsonHelp(){
  toast('📋 Ver el comentario en el código fuente del HTML para el formato JSON');
}
